<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    // Fallback Icons Helper
    const IconHelper = ({ name, size = 24, className = "" }) => {
      const ref = useRef(null);
      useEffect(() => {
        if (ref.current && window.lucide) {
           const iconData = window.lucide.icons[name];
           if (iconData) {
             lucide.createIcons({
                icons: { [name]: iconData },
                nameAttr: 'data-lucide',
                root: ref.current.parentElement
             });
           }
        }
      }, [name]);
      return <i data-lucide={name.replace(/[A-Z]/g, m => "-" + m.toLowerCase()).replace(/^-/, '')} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i>;
    };

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyOdgzCBWELdmCiU95yrolB8nxOhfuNMge0tuOp4mf9k_VVyx7vKer88SDW-Z9uK4jg/exec";

const SwipeableRow = ({ children, onSwipeLeft, onSwipeRight, onClick, showTrash }) => {
  const [offset, setOffset] = React.useState(0);
  const startX = React.useRef(0);
  const currentX = React.useRef(0);
  const isDragging = React.useRef(false);
  const gestureDidDrag = React.useRef(false);

  const handleStart = (clientX) => {
    isDragging.current = true;
    gestureDidDrag.current = false;
    startX.current = clientX;
    currentX.current = clientX;
  };

  const handleMove = (clientX) => {
    if (!isDragging.current) return;
    currentX.current = clientX;
    const diff = currentX.current - startX.current;
    if (Math.abs(diff) > 20) {
      gestureDidDrag.current = true;
      setOffset(diff);
    }
  };

  const handleEnd = (e) => {
    if (!isDragging.current) return;
    isDragging.current = false;
    
    const diff = currentX.current - startX.current;
    if (diff < -80 && onSwipeLeft) {
      onSwipeLeft();
    } else if (diff > 80 && onSwipeRight) {
      onSwipeRight();
    }
    setOffset(0);
  };

  const handleClick = (e) => {
    if (gestureDidDrag.current) {
      e.stopPropagation();
      e.preventDefault();
      // reset after block
      setTimeout(() => { gestureDidDrag.current = false; }, 100);
      return;
    }
    if (onClick) {
      onClick(e);
    }
  };

  return (
    <div className="relative overflow-hidden w-full bg-slate-50 border-b border-white select-none">
      {!showTrash && (
        <>
          <div className={`absolute inset-y-0 left-0 bg-blue-500 text-white flex items-center px-6 transition-opacity duration-200 ${offset > 20 ? 'opacity-100' : 'opacity-0'}`}>
            <span className="font-bold flex items-center gap-2"><Share size={18} /> แชร์เอกสาร</span>
          </div>
          <div className={`absolute inset-y-0 right-0 bg-red-500 text-white flex items-center justify-end px-6 transition-opacity duration-200 ${offset < -20 ? 'opacity-100' : 'opacity-0'}`}>
            <span className="font-bold flex items-center gap-2">ลบ <Trash2 size={18} /></span>
          </div>
        </>
      )}
      <div 
        className="relative bg-white transition-transform duration-200 ease-out cursor-pointer hover:bg-slate-50/80 active:bg-slate-100"
        style={{ transform: `translateX(${offset}px)` }}
        onTouchStart={(e) => handleStart(e.touches[0].clientX)}
        onTouchMove={(e) => handleMove(e.touches[0].clientX)}
        onTouchEnd={handleEnd}
        onMouseDown={(e) => handleStart(e.clientX)}
        onMouseMove={(e) => handleMove(e.clientX)}
        onMouseUp={handleEnd}
        onMouseLeave={handleEnd}
        onClickCapture={handleClick}
      >
        {children}
      </div>
    </div>
  );
};

function App() {
  const [view, setView] = useState('home');
  const [searchQuery, setSearchQuery] = useState('');
  const [isUploading, setIsUploading] = useState(false);
  const [isEditingSettings, setIsEditingSettings] = useState(false);
  const [showTypeSelector, setShowTypeSelector] = useState(false);

  const [showTrash, setShowTrash] = useState(false);
  const [docToDelete, setDocToDelete] = useState(null);
  const [actionSheetDoc, setActionSheetDoc] = useState(null);
  const [filterType, setFilterType] = useState('all');
  const [isSidebarOpen, setIsSidebarOpen] = useState(false);

    const cached = localStorage.getItem('bhr_history');
    return cached ? JSON.parse(cached) : [];
  });
  const [isFetching, setIsFetching] = useState(true);
  const [nextId, setNextId] = useState('QT-001');
  const [currentDoc, setCurrentDoc] = useState(null);

  const handleSmartDuplicate = (doc) => {

    if (doc.type === 'Invoice') targetType = 'Receipt';
    else if (doc.type === 'Receipt') targetType = 'Receipt';
    
    setCurrentDoc({
      ...doc,
      id: nextId,
      type: targetType,
      date: new Date().toISOString().split('T')[0],

    });
    setActionSheetDoc(null);
    setView('form');
  };

  const handleOpenExternalPDF = (doc) => {
    if (doc.pdfUrl && doc.pdfUrl !== 'preview') {
      window.open(doc.pdfUrl, '_blank');
    } else {
      showStatus('ลิงก์ PDF ยังไม่พร้อม หรือเป็นเอกสารเก่า', 'error');
    }
    setActionSheetDoc(null);
  };
  
  // Persisted Settings & Trash
  const [companySettings, setCompanySettings] = useState(() => {
    const saved = localStorage.getItem('bhr_settings');
    return saved ? JSON.parse(saved) : {
      name: 'บริษัท กิต จำกัด',
      phone: '080-123-4567',
      lineId: '@kit_company',
      address: '123 ถ.สุขุมวิท กรุงเทพฯ',
      defaultRemark: 'เงื่อนไข: มัดจำ 50% ก่อนเริ่มงาน, ส่วนที่เหลือชำระหลังส่งมอบงานภายใน 7 วัน',
      signature: null 
    };
  });

  const [devContactInfo, setDevContactInfo] = useState(() => {
    return localStorage.getItem('bhr_dev_contact') || 'กิต (KITKAT)\nเมต้า ซอฟต์แวร์ สิงค์โปร\nLine: @kitsns';
  });
  const [isDevEditing, setIsDevEditing] = useState(false);

  // Unique Customer list for Autocomplete
  const uniqueCustomers = Array.from(new Set(documents.map(d => d.customerName).filter(Boolean)));

  // --- Refs & Libraries ---
  const canvasRef = useRef(null);
  const [isDrawing, setIsDrawing] = useState(false);

  // Persistence Effects
  useEffect(() => { localStorage.setItem('bhr_settings', JSON.stringify(companySettings)); }, [companySettings]);
  useEffect(() => { localStorage.setItem('bhr_dev_contact', devContactInfo); }, [devContactInfo]);

  // Initial Load & PWA Setup
  useEffect(() => {
    const script = document.createElement('script');
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js";
    script.async = true;
    document.body.appendChild(script);
    
    // PWA Injection
    if (!document.querySelector('link[rel="manifest"]')) {
      const manifestStr = JSON.stringify({
         name: "BillSpace Exe",
         short_name: "BillSpace",
         display: "standalone",
         background_color: "#F8FAFC",
         theme_color: "#4F46E5",
         icons: [{ src: "https://cdn-icons-png.flaticon.com/512/3204/3204014.png", sizes: "512x512", type: "image/png" }]
      });
      const blob = new Blob([manifestStr], {type: 'application/json'});
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = URL.createObjectURL(blob);
      document.head.appendChild(link);
    }
    
    fetchHistory();
    return () => { if(document.body.contains(script)) document.body.removeChild(script); };
  }, []);

  const fetchHistory = async (retryCount = 0) => {
    if (retryCount === 0) setIsFetching(true);
    try {
      const response = await fetch(SCRIPT_URL);
      const result = await response.json();
      if (result.status === 'success') {
        const docs = (result.data || []).map(d => {
           if (d.rawJson) {
              try {
                const parsed = JSON.parse(d.rawJson);
                return { ...d, ...parsed };
              } catch(e) {}
           }
           return d;
        });
        setDocuments(docs);
        localStorage.setItem('bhr_history', JSON.stringify(docs));
        setNextId(result.nextId || 'QT-001');
        setIsFetching(false);
      }
    } catch (e) {
      if (retryCount < 3) {
        setTimeout(() => fetchHistory(retryCount + 1), 1000 * Math.pow(2, retryCount));
      } else {
        showStatus('ไม่สามารถโหลดข้อมูลจากเซิร์ฟเวอร์ได้', 'error');
        setIsFetching(false);
      }
    }
  };

  const showStatus = (msg, type = 'info') => {
    setStatusMsg({ msg, type });
    setTimeout(() => setStatusMsg(null), 4000);
  };

  // --- Signature Logic ---
  const startDrawing = (e) => {
    const canvas = canvasRef.current;
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    ctx.beginPath(); ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#000080'; 
    const rect = canvas.getBoundingClientRect();
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    ctx.moveTo((clientX - rect.left) * scaleX, (clientY - rect.top) * scaleY);
    setIsDrawing(true);
  };

  const draw = (e) => {
    if (!isDrawing) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    const rect = canvas.getBoundingClientRect();
    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    ctx.lineTo((clientX - rect.left) * scaleX, (clientY - rect.top) * scaleY);
    ctx.stroke();
  };

  const stopDrawing = () => {
    if (isDrawing) {
      setIsDrawing(false);
      const canvas = canvasRef.current;
      setCompanySettings(prev => ({...prev, signature: canvas.toDataURL('image/png')}));
    }
  };

  const clearSignature = () => {
    const canvas = canvasRef.current;
    if(canvas) { canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height); }
    setCompanySettings(prev => ({...prev, signature: null}));
  };

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (event) => setCompanySettings(prev => ({...prev, signature: event.target.result}));
      reader.readAsDataURL(file);
    }
  };

  // --- Calculations ---
  const getTotals = (doc = currentDoc) => {
    if (!doc) return { subtotal: 0, discount: 0, vat: 0, grandTotal: 0 };
    const subtotal = (doc.items || []).reduce((sum, item) => {
        const q = item.isLumpSum ? 1 : (Number(item.qty) || 0);
        return sum + (q * (Number(item.price) || 0));
    }, 0);
    const discount = Number(doc.discount) || 0;
    const afterDiscount = Math.max(0, subtotal - discount);
    
    let vat = 0;
    let grandTotal = afterDiscount;
    // vatType = 'none' (ไม่มีแวต), 'exc' (แวตนอก), 'inc' (แวตใน)
    if (doc.vatType === 'exc' || doc.vatEnabled === true) {
       vat = afterDiscount * 0.07;
       grandTotal = afterDiscount + vat;
    } else if (doc.vatType === 'inc') {
       vat = afterDiscount - (afterDiscount / 1.07);
    }
    
    return { subtotal, discount, vat, grandTotal };
  };

  const handleDeleteDoc = async (id, e, skipConfirm = false) => {
    if (e && e.stopPropagation) e.stopPropagation();
    if (skipConfirm || window.confirm('คุณต้องการทิ้งเอกสารนี้ลงถังขยะใช่หรือไม่?')) {
      showStatus('กำลังลบเอกสาร...', 'loading');
      try {
        const payload = { action: 'deletePDF', id: id };
        const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await response.json();
        if (result.status === 'success') {
          const newDocs = documents.map(d => d.id === id ? { ...d, isDeleted: true } : d);
          setDocuments(newDocs);
          localStorage.setItem('bhr_history', JSON.stringify(newDocs));
          showStatus('ย้ายบิลลงถังขยะเรียบร้อย', 'success');
          setView('home'); 
        } else {
          showStatus('ลบล้มเหลว', 'error');
        }
      } catch (err) {
        showStatus('การเชื่อมต่อล้มเหลว', 'error');
      }
    }
  };

  const handleRestoreDoc = async (id) => {
    showStatus('กำลังกู้คืนเอกสาร...', 'loading');
    try {
      const payload = { action: 'restorePDF', id: id };
      const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
      const result = await response.json();
      if (result.status === 'success') {
        const newDocs = documents.map(d => d.id === id ? { ...d, isDeleted: false } : d);

        localStorage.setItem('bhr_history', JSON.stringify(newDocs));
        showStatus('กู้คืนเอกสารเรียบร้อย', 'success');

          <h1 className="text-2xl font-bold text-blue-700">{companySettings.name}</h1>
          <p className="text-[12px] text-gray-600 mt-1 leading-tight">{companySettings.address}</p>
          <p className="text-[12px] text-gray-600">โทร: {companySettings.phone} {companySettings.lineId && `| Line: ${companySettings.lineId}`}</p>
        </div>
        <div className="text-right">
          <h2 className="text-3xl font-black text-gray-800 uppercase tracking-tighter">
            {currentDoc?.type === 'Quotation' ? 'ใบเสนอราคา' : currentDoc?.type === 'Invoice' ? 'ใบแจ้งหนี้' : 'ใบเสร็จรับเงิน'}
          </h2>
          <div className="mt-4 flex flex-col items-end gap-1 text-[13px] text-left">
            <div className="grid grid-cols-2 gap-x-4 gap-y-1">
              <span className="text-gray-400 font-bold text-right">เลขที่ / No:</span>
              <span className="font-bold">{currentDoc?.id}</span>

                          </div>
                          <div className="col-span-3">
                              <span className={`inline-flex items-center px-2.5 py-1.5 rounded-md text-[12px] font-bold uppercase tracking-wider border shadow-sm ${bColor}`}>{typeLabel}</span>
                          </div>
                          <div className="col-span-2 text-slate-500 text-[14px] font-semibold">
                              {String(doc.date || '').split('T')[0]}
                          </div>
                          <div className="col-span-3 text-right flex justify-end items-center gap-4">
                              <p className="font-black text-[17px] text-slate-900 shrink-0">฿{parseFloat(doc.total).toLocaleString(undefined, {minimumFractionDigits: 2})}</p>
                              {!showTrash && <button onClick={(e) => { e.stopPropagation(); setActionSheetDoc(doc); }} className="p-1.5 text-slate-400 hover:text-slate-700 bg-white hover:bg-slate-100 shadow-sm border border-slate-200 rounded-md transition-all opacity-0 group-hover:opacity-100 focus:opacity-100 shrink-0"><MoreVertical size={16} /></button>}
                          </div>
                      </div>
                  </div>
                  )})}
              </div>
            </div>
          </>
        )}

        {view === 'form' && currentDoc && (
          <div className="space-y-6 pb-20">
             <div className="bg-white rounded-2xl overflow-hidden text-[17px]">
                 <div className="px-4 py-3.5 border-b border-gray-200/60 ml-2">
                    <span className="text-gray-900 font-medium block mb-3">ประเภทเอกสาร</span>
                    <div className="flex gap-2 bg-slate-100 p-1.5 rounded-xl">
                      {[{v:'Quotation', l:'ใบเสนอราคา'}, {v:'Invoice', l:'ใบแจ้งหนี้'}, {v:'Receipt', l:'ใบเสร็จรับเงิน'}].map(t => (
                        <button key={t.v} onClick={() => setCurrentDoc({...currentDoc, type: t.v})} className={`flex-1 py-1.5 rounded-lg text-[13px] font-semibold transition-all ${currentDoc.type === t.v ? 'bg-white text-indigo-600 shadow-sm ring-1 ring-slate-200/50' : 'text-slate-500 hover:text-slate-700'}`}>{t.l}</button>
                      ))}
                    </div>
                 </div>
                 <div className="flex justify-between items-center px-4 py-3.5 border-b border-gray-200/60 ml-2">
                     <span className="text-gray-900 font-medium whitespace-nowrap">ชื่อลูกค้า</span>
                     <input type="text" list="customer-list" className="text-right font-medium text-slate-800 outline-none w-2/3 placeholder-slate-300" value={currentDoc.customerName} onChange={e => setCurrentDoc({...currentDoc, customerName: e.target.value})} placeholder="ระบุชื่อลูกค้า (เว้นว่างได้)" />
                     <datalist id="customer-list">
                        {uniqueCustomers.map((c, i) => <option key={i} value={c} />)}
                     </datalist>
                 </div>
                 <div className="flex justify-between items-center px-4 py-3.5 ml-2">
                     <span className="text-gray-900 font-medium whitespace-nowrap">ชื่องาน <span className="text-slate-400 text-[13px] font-normal">(ถ้ามี)</span></span>
                     <input type="text" className="text-right font-medium text-slate-800 outline-none w-2/3 placeholder-slate-300" value={currentDoc.jobName || ''} onChange={e => setCurrentDoc({...currentDoc, jobName: e.target.value})} placeholder="เช่น โครงการปรับปรุง..." />
                 </div>
             </div>

             <div className="space-y-4">
                <h3 className="text-[13px] text-gray-500 uppercase px-4 mb-[-8px]">รายการสินค้า</h3>
                {(currentDoc.items || []).map((item, i) => (
                  <div key={i} className="bg-white rounded-2xl overflow-hidden text-[17px] relative">
                    <button onClick={() => { const ni = currentDoc.items.filter((_, idx) => idx !== i); setCurrentDoc({...currentDoc, items: ni}); }} className="absolute right-4 top-3.5 text-red-500"><Trash2 size={20} /></button>
                    <div className="flex justify-between items-center px-4 py-3.5 border-b border-gray-200/60 ml-2 pr-12">
                       <input type="text" className="w-full font-medium outline-none text-gray-900" placeholder="ชื่อรายการ..." value={item.name} onChange={e => { const ni = [...currentDoc.items]; ni[i].name = e.target.value; setCurrentDoc({...currentDoc, items: ni}); }} />
                    </div>
                    <div className="flex border-b border-gray-200/60 ml-6">
                      {!item.isLumpSum && (
                        <div className="flex-1 py-3.5 pr-4 border-r border-gray-200/60 flex items-center justify-between"><span className="text-gray-500">จำนวน</span><input type="number" className="text-right font-normal outline-none text-gray-900 w-16" placeholder="0" value={item.qty} onChange={e => { const ni = [...currentDoc.items]; ni[i].qty = e.target.value; setCurrentDoc({...currentDoc, items: ni}); }} /></div>
                      )}
                      <div className="flex-[2] py-3.5 pr-4 pl-4 flex items-center justify-between"><span className="text-gray-500">ราคา</span><input type="number" className="text-right font-normal outline-none text-gray-900 w-full" placeholder="0.00" value={item.price} onChange={e => { const ni = [...currentDoc.items]; ni[i].price = e.target.value; setCurrentDoc({...currentDoc, items: ni}); }} /></div>
                    </div>
                    <div className="flex justify-between items-center px-4 py-3 ml-2">
                       <span className="text-gray-500 text-[15px]">รูปแบบการขาย (เหมา)</span>
                       <label className="relative inline-flex items-center cursor-pointer">
                          <input type="checkbox" className="sr-only peer" checked={item.isLumpSum} onChange={e => { const ni = [...currentDoc.items]; ni[i].isLumpSum = e.target.checked; if(ni[i].isLumpSum) { ni[i].qty = ''; } else { ni[i].qty = 1; } setCurrentDoc({...currentDoc, items: ni}); }} />
                          <div className="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                       </label>
                    </div>
                  </div>
                ))}
                <button onClick={() => setCurrentDoc({...currentDoc, items: [...currentDoc.items, {name: '', qty: '', price: '', isLumpSum: false}]})} className="w-full bg-white rounded-2xl py-3.5 text-blue-500 font-medium flex items-center justify-center gap-2"><Plus size={20} /> เพิ่มรายการใหม่</button>
             </div>

             <div className="bg-white rounded-2xl overflow-hidden text-[17px]">
                <div className="flex justify-between items-center px-4 py-3.5 border-b border-gray-200/60 ml-2">
                    <span className="text-gray-900 font-medium">ส่วนลด (บาท)</span>
                    <input type="number" className="text-right font-normal text-gray-500 outline-none w-32" value={currentDoc.discount} onChange={e => setCurrentDoc({...currentDoc, discount: e.target.value})} placeholder="0.00" />
                </div>
                <div className="flex justify-between items-center px-4 py-3.5 border-b border-gray-200/60 ml-2">
                    <span className="text-gray-900 font-medium">ภาษีมูลค่าเพิ่ม (VAT 7%)</span>
                    <label className="relative inline-flex items-center cursor-pointer">
                       <input type="checkbox" className="sr-only peer" checked={currentDoc.vatType === 'exc'} onChange={e => setCurrentDoc({...currentDoc, vatType: e.target.checked ? 'exc' : 'none'})} />
                       <div className="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-indigo-600"></div>
                    </label>
                </div>
                <div className="flex justify-between items-center px-4 py-4 bg-gray-50/50">
                  <span className="text-gray-500 font-medium">ยอดสุทธิ</span>
                  <span className="text-[22px] font-bold text-[#000000]">฿{getTotals().grandTotal.toLocaleString(undefined, {minimumFractionDigits: 2})}</span>
                </div>
             </div>
             <div className="bg-white rounded-2xl overflow-hidden text-[17px] mt-4 border border-slate-100">
                 <div className="flex flex-col px-4 py-3.5">
                     <span className="text-gray-900 font-medium mb-3">หมายเหตุ / เงื่อนไข</span>
                     <textarea 
                        className="w-full font-medium outline-none text-slate-600 bg-slate-50 border border-slate-200 rounded-xl p-4 text-[14px] h-28 resize-none focus:border-indigo-500 focus:bg-white transition-colors leading-relaxed" 
                        value={currentDoc.remark !== undefined ? currentDoc.remark : ''} 
                        onChange={e => setCurrentDoc({...currentDoc, remark: e.target.value})} 
                        placeholder="ระบุหมายเหตุหรือเงื่อนไขการชำระเงิน..." 
                     />
                 </div>
             </div>
          </div>
        )}

        {view === 'settings' && (
          <div className="space-y-6 pb-20 animate-in-page fade-in-page duration-300">
            <div className="flex justify-between items-center mb-1">
               <h2 className="text-xl sm:text-2xl font-bold tracking-tight text-slate-900">การตั้งค่าบริษัท</h2>
               <button onClick={() => setIsEditingSettings(!isEditingSettings)} className={`px-4 py-1.5 rounded-md font-semibold text-[13px] border transition-colors ${isEditingSettings ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-slate-200 text-slate-700 hover:bg-slate-50'}`}>{isEditingSettings ? 'บันทึกเรียบร้อย' : 'แก้ไขข้อมูล'}</button>
            </div>
            
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
              <div className="px-6 py-4 border-b border-slate-200 bg-slate-50">
                  <h3 className="text-[14px] font-semibold text-slate-900">ข้อมูลติดต่อ</h3>
              </div>
              <div className="divide-y divide-slate-100">
                  {[{k: 'name', l: 'ชื่อบริษัท'}, {k: 'phone', l: 'เบอร์โทร'}, {k: 'lineId', l: 'Line ID'}, {k: 'address', l: 'ที่อยู่'}].map((field) => (
                    <div key={field.k} className="flex flex-col sm:flex-row sm:items-center px-6 py-4">
                      <span className="text-slate-500 font-medium text-[14px] sm:w-1/3 mb-1 sm:mb-0">{field.l}</span>
                      {isEditingSettings ? <input className="sm:w-2/3 font-medium outline-none text-slate-900 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-[14px] focus:border-indigo-500 focus:bg-white transition-colors" value={companySettings[field.k]||''} onChange={e => setCompanySettings({...companySettings, [field.k]: e.target.value})} placeholder={`กรอก${field.l}`} /> : <p className="font-semibold text-slate-900 truncate sm:w-2/3 text-[14px]">{companySettings[field.k]||'-'}</p>}
                    </div>
                  ))}
                  <div className="flex flex-col sm:flex-row sm:items-start px-6 py-4">
                      <span className="text-slate-500 font-medium text-[14px] sm:w-1/3 mb-1 sm:mb-0 mt-2">หมายเหตุตั้งต้น</span>
                      {isEditingSettings ? <textarea className="sm:w-2/3 font-medium outline-none text-slate-900 bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-[14px] focus:border-indigo-500 focus:bg-white transition-colors h-24 resize-none leading-relaxed" value={companySettings.defaultRemark||''} onChange={e => setCompanySettings({...companySettings, defaultRemark: e.target.value})} placeholder="ข้อความที่จะแสดงท้ายบิลอัตโนมัติ..." /> : <p className="font-semibold text-slate-900 sm:w-2/3 text-[14px] whitespace-pre-wrap leading-relaxed">{companySettings.defaultRemark||'-'}</p>}
                  </div>
              </div>
            </div>
            
            <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
              <div className="px-6 py-4 border-b border-slate-200 bg-slate-50 flex items-center justify-between">
                  <h3 className="text-[14px] font-semibold text-slate-900">ลายเซ็นอิเล็กทรอนิกส์</h3>
                  <span className="text-[11px] font-medium text-slate-400 uppercase tracking-widest bg-white border border-slate-200 px-2 py-0.5 rounded-full">E-Signature</span>
              </div>
              <div className="p-6">
                  {isEditingSettings ? (
                    <div className="space-y-4 max-w-lg">
                      <div className="border-2 border-dashed border-slate-300 rounded-xl bg-slate-50 overflow-hidden relative h-36 touch-none hover:border-indigo-400 transition-colors">
                        <canvas ref={canvasRef} width={600} height={150} className="w-full h-full relative z-10 cursor-crosshair" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
                        {!companySettings.signature && !isDrawing && <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none text-slate-400 text-sm"><Edit3 size={24} className="mb-2 opacity-50" /><span className="font-medium">วาดลายเซ็นที่นี่</span></div>}
                      </div>
                      <div className="flex gap-3">
                        <button onClick={clearSignature} className="flex-1 py-2 bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 rounded-lg font-semibold text-[13px] shadow-sm transition-all">ล้างกระดาน</button>
                        <label className="flex-1 py-2 bg-indigo-50 text-indigo-700 border border-indigo-200 hover:bg-indigo-100 rounded-lg font-semibold text-[13px] text-center cursor-pointer flex items-center justify-center gap-2 shadow-sm transition-all"><Upload size={16} /> อัปโหลดไฟล์<input type="file" className="hidden" onChange={handleImageUpload} /></label>
                      </div>
                    </div>
                  ) : (
                    <div className="h-32 w-full max-w-sm border border-slate-200 rounded-xl flex items-center justify-center bg-slate-50/50">
                      {companySettings.signature ? <img src={companySettings.signature} className="h-full w-full object-contain mix-blend-multiply p-2" /> : <p className="text-slate-400 font-medium text-[13px] flex items-center gap-2"><EyeOff size={16} /> ไม่มีลายเซ็นในระบบ</p>}
                    </div>
                  )}
              </div>
            </div>
          </div>
        )}
      </main>

      {/* Delete Confirmation Modal */}
      {docToDelete && (
        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
           <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm animate-in-page fade-in-page" onClick={() => setDocToDelete(null)} />
           <div className="relative w-full max-w-sm bg-white rounded-2xl shadow-2xl p-6 text-center animate-in-page fade-in-page scale-in-center">
               <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Trash2 size={24} />
               </div>
               <h3 className="text-lg font-bold text-slate-900 mb-2">ยืนยันการลบเอกสาร</h3>
               <p className="text-slate-500 text-sm mb-6">คุณต้องการลบเอกสารของ <b>{docToDelete.customerName || 'ลูกค้าทั่วไป'}</b> ใช่หรือไม่?<br/><span className="text-xs mt-1 block">(ระบบสามารถกู้คืนได้ภายใน 30 วัน)</span></p>
               <div className="grid grid-cols-2 gap-3">
                   <button onClick={() => setDocToDelete(null)} className="py-2.5 bg-slate-100 text-slate-700 font-bold rounded-lg hover:bg-slate-200 transition-colors">ยกเลิก</button>
                   <button onClick={() => { handleDeleteDoc(docToDelete.id, null, true); setDocToDelete(null); }} className="py-2.5 bg-red-500 text-white font-bold rounded-lg hover:bg-red-600 shadow-md shadow-red-500/20 transition-all">ลบทิ้งทันที</button>
               </div>
           </div>
        </div>
      )}

      {/* Action Sheet Modal */}
      {actionSheetDoc && (
        <div className="fixed inset-0 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-4">
          <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm animate-in-page fade-in-page" onClick={() => setActionSheetDoc(null)} />
          <div className="relative w-full sm:max-w-sm bg-white rounded-t-3xl sm:rounded-2xl shadow-2xl overflow-hidden slide-in-bottom sm:scale-in-center pb-8 sm:pb-0">
             <div className="w-12 h-1.5 bg-slate-200 rounded-full mx-auto my-3 sm:hidden" />
             <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                 <div className="w-full">
                   <h3 className="text-[17px] font-bold text-slate-900 leading-tight truncate pr-4">{actionSheetDoc.customerName || 'ลูกค้าทั่วไป'}</h3>
                   <p className="text-[13px] text-slate-500">{actionSheetDoc.id}</p>
                 </div>
                 <button onClick={() => setActionSheetDoc(null)} className="p-2 bg-slate-50 text-slate-500 rounded-full hover:bg-slate-100"><X size={18} /></button>
             </div>
             <div className="p-2 space-y-1 bg-slate-50/30">
                <button onClick={() => handleOpenExternalPDF(actionSheetDoc)} className="w-full py-3.5 px-4 rounded-xl font-bold text-[15px] flex items-center gap-3 text-slate-700 hover:bg-slate-100 active:bg-slate-200 transition-colors">
                    <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center"><ExternalLink size={16} /></div> 
                    เปิดดูไฟล์ PDF
                </button>
                <button onClick={() => { handleNativeShare(actionSheetDoc); setActionSheetDoc(null); }} className="w-full py-3.5 px-4 rounded-xl font-bold text-[15px] flex items-center gap-3 text-slate-700 hover:bg-slate-100 active:bg-slate-200 transition-colors">
                    <div className="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center"><Share size={16} /></div> 
                    แชร์ส่งเอกสาร
                </button>
                <div className="h-px bg-slate-100 my-2 mx-4" />
                <button onClick={() => { setView('form'); setCurrentDoc({...actionSheetDoc}); setActionSheetDoc(null); }} className="w-full py-3.5 px-4 rounded-xl font-bold text-[15px] flex items-center gap-3 text-slate-700 hover:bg-slate-100 active:bg-slate-200 transition-colors">
                    <div className="w-8 h-8 rounded-full bg-slate-100 text-slate-600 flex items-center justify-center"><Edit size={16} /></div> 
                    แก้ไขเนื้อหาเดิม
                </button>
                <button onClick={() => handleSmartDuplicate(actionSheetDoc)} className="w-full py-3.5 px-4 rounded-xl font-bold text-[15px] flex items-center gap-3 text-slate-700 hover:bg-slate-100 active:bg-slate-200 transition-colors text-left">
                    {actionSheetDoc.type === 'Quotation' ? (
                       <><div className="w-8 h-8 rounded-full bg-orange-100 text-orange-600 flex items-center justify-center shrink-0"><FileText size={16} /></div> สร้างใบแจ้งหนี้จากใบเสนอราคานี้</>
                    ) : actionSheetDoc.type === 'Invoice' ? (
                       <><div className="w-8 h-8 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center shrink-0"><FileText size={16} /></div> สร้างใบเสร็จรับเงินจากใบแจ้งหนี้นี้</>
                    ) : (
                       <><div className="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center shrink-0"><Copy size={16} /></div> คัดลอกสร้างบิลใหม่จากใบเสร็จนี้</>
                    )}
                </button>
                <div className="h-px bg-slate-100 my-2 mx-4" />
                <button onClick={() => { setDocToDelete(actionSheetDoc); setActionSheetDoc(null); }} className="w-full py-3.5 px-4 rounded-xl font-bold text-[15px] flex items-center gap-3 text-red-600 hover:bg-red-50 active:bg-red-100 transition-colors">
                    <div className="w-8 h-8 rounded-full bg-red-100 text-red-600 flex items-center justify-center"><Trash2 size={16} /></div> 
                    ลบเอกสาร
                </button>
             </div>
          </div>
        </div>
      )}


      {/* Extended Floating Action Button (FAB) */}
      {view !== 'form' && (
        <button 
           onClick={initNewDoc} 
           className="fixed bottom-6 right-6 sm:bottom-8 sm:right-8 z-40 bg-indigo-600 text-white px-5 sm:px-6 py-3.5 sm:py-4 rounded-full shadow-[0_8px_30px_rgba(79,70,229,0.4)] hover:bg-indigo-700 hover:-translate-y-1 active:scale-95 transition-all flex items-center justify-center gap-2.5 print:hidden group border border-indigo-500/50"
        >
           <div className="bg-white/25 p-1 rounded-full group-hover:rotate-90 transition-transform duration-300"><Plus size={18} strokeWidth={3} /></div>
           <span className="font-extrabold text-[15px] sm:text-[16px] tracking-wide">สร้างรายการใหม่</span>
        </button>
      )}
      
      <style>{`
        /* Page animation */
        @keyframes fade-in-page { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in-page { animation: fade-in-page 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Navbar animation fix: ensures translateX(-50%) is preserved */
        @keyframes slide-in-navbar { 
            from { opacity: 0; transform: translate(-50%, 20px); } 
            to { opacity: 1; transform: translate(-50%, 0); } 
        }
        .glass-navbar-animation { 
            animation: slide-in-navbar 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; 
        }

        /* Standard slide in for sheets */
        @keyframes slide-in-bottom { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .slide-in-bottom { animation: slide-in-bottom 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Hide Number Input Spinners */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
          -webkit-appearance: none; 
          margin: 0; 
        }

        @media print { .print\\:hidden { display: none !important; } }
        ::-webkit-scrollbar { display: none; }
      `}</style>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
